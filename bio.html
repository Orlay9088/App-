<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SmartLinks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0058bc;
      --primary-container: #0070eb;
      --bg-level-0: #f7f9fb;
      --bg-level-2: #ffffff;
      --text-main: #191c1e;
      --text-variant: #414755;
      --ghost-border: rgba(193, 198, 215, 0.25);
      --ambient-shadow: 0px 12px 32px rgba(25, 28, 30, 0.06);
      --radius: 0.375rem;
    }
    body {
      margin: 0; padding: 0;
      background: var(--bg-level-0);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      width: 100%; max-width: 480px; padding: 48px 24px; box-sizing: border-box;
      display: flex; flex-direction: column; align-items: center; gap: 24px;
    }
    .profile-pic {
      width: 96px; height: 96px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-container));
      margin-bottom: 8px;
    }
    .title {
      font-size: 28px; font-weight: 300; margin: 0; letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 15px; color: var(--text-variant); margin-bottom: 32px; text-align: center; font-weight: 400;
    }
    .links-wrap {
      width: 100%; display: flex; flex-direction: column; gap: 20px;
    }
    .link-card {
      width: 100%;
      background: var(--bg-level-2);
      border: 1px solid var(--ghost-border);
      border-radius: var(--radius);
      padding: 18px 24px; box-sizing: border-box;
      text-align: center; font-weight: 500; font-size: 15px;
      color: var(--primary); text-decoration: none;
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
      box-shadow: var(--ambient-shadow);
    }
    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0px 16px 40px rgba(25, 28, 30, 0.1);
      border-color: rgba(193, 198, 215, 0.4);
    }
    .footer {
      margin-top: auto; padding: 32px;
      font-size: 12px; color: var(--text-variant); font-weight: 500; text-transform: uppercase; letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile-pic"></div>
    <h1 class="title">SocialPulse</h1>
    <div class="subtitle">Descubre nuestro contenido más reciente.</div>
    
    <div id="links-container" class="links-wrap">
      <div style="text-align:center; color:var(--text-variant); font-size:14px;">Cargando links...</div>
    </div>
  </div>
  
  <div class="footer">⚡ Powered by SocialPulse</div>

  <script>
    async function loadLinks() {
      try {
        const res = await fetch('/api/smartlinks/public');
        const links = await res.json();
        const container = document.getElementById('links-container');
        if (!links || links.length === 0) {
          container.innerHTML = '<div style="text-align:center; color:#a1a1aa; font-size:14px;">No hay links disponibles actualmente.</div>';
          return;
        }
        container.innerHTML = links.map(l => `
          <a href="${l.url}" class="link-card" target="_blank" rel="noopener noreferrer" onclick="trackClick(${l.id})">
            ${l.titulo.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
          </a>
        `).join('');
      } catch (e) {
        document.getElementById('links-container').innerHTML = '<div style="color:#ff6b8a; text-align:center;">Error cargando links</div>';
      }
    }
    
    function trackClick(id) {
      if (navigator.sendBeacon) {
        navigator.sendBeacon(`/api/smartlinks/${id}/click`);
      } else {
        fetch(`/api/smartlinks/${id}/click`, { method: 'POST' }).catch(()=>{});
      }
    }
    
    loadLinks();
  </script>
</body>
</html>
