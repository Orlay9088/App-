<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SmartLinks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --text: #f4f4f5;
      --card-bg: #18181b;
      --accent: #7c6fff;
    }
    body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 100%; max-width: 480px; padding: 40px 20px; box-sizing: border-box;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .profile-pic {
      width: 96px; height: 96px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #ff6b8a);
      margin-bottom: 8px;
    }
    .title {
      font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; margin: 0;
    }
    .subtitle {
      font-size: 14px; color: #a1a1aa; margin-bottom: 24px; text-align: center;
    }
    .link-card {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 16px; box-sizing: border-box;
      text-align: center; font-weight: 600; font-size: 15px;
      color: var(--text); text-decoration: none;
      transition: all 0.2s;
    }
    .link-card:hover {
      background: #27272a; border-color: var(--accent);
      transform: translateY(-2px);
    }
    .footer {
      margin-top: auto; padding: 24px;
      font-size: 12px; color: #a1a1aa; font-family: 'Syne', sans-serif; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile-pic"></div>
    <h1 class="title">SocialPulse Links</h1>
    <div class="subtitle">Descubre nuestro contenido más reciente.</div>
    
    <div id="links-container" style="width: 100%; display: flex; flex-direction: column; gap: 16px;">
      <div style="text-align:center; color:#a1a1aa; font-size:14px;">Cargando links...</div>
    </div>
  </div>
  
  <div class="footer">⚡ Powered by SocialPulse</div>

  <script>
    async function loadLinks() {
      try {
        const res = await fetch('/api/smartlinks/public');
        const links = await res.json();
        const container = document.getElementById('links-container');
        if (!links || links.length === 0) {
          container.innerHTML = '<div style="text-align:center; color:#a1a1aa; font-size:14px;">No hay links disponibles actualmente.</div>';
          return;
        }
        container.innerHTML = links.map(l => `
          <a href="${l.url}" class="link-card" target="_blank" rel="noopener noreferrer" onclick="trackClick(${l.id})">
            ${l.titulo.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
          </a>
        `).join('');
      } catch (e) {
        document.getElementById('links-container').innerHTML = '<div style="color:#ff6b8a; text-align:center;">Error cargando links</div>';
      }
    }
    
    function trackClick(id) {
      if (navigator.sendBeacon) {
        navigator.sendBeacon(`/api/smartlinks/${id}/click`);
      } else {
        fetch(`/api/smartlinks/${id}/click`, { method: 'POST' }).catch(()=>{});
      }
    }
    
    loadLinks();
  </script>
</body>
</html>
